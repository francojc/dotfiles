import = [
  "~/.config/alacritty/themes/themes/iterm.toml"
]

[env]
TERM = "xterm-256color"

[font]
size = 13.0

[font.normal]
family = "MesloLGS NF"
style = "Regular"

[scrolling]
history = 10000
multiplier = 3

[window]
dynamic_title = true
decorations = "Buttonless"

[window.padding]
x = 10
y = 10
