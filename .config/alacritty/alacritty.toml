import = [
  "~/.config/alacritty/themes/themes/iterm.toml"
]

[env]
TERM = "xterm-256color"

[font]
size = 13.0

[font.normal]
family = "MesloLGL Nerd Font Mono"
style = "Regular"

[scrolling]
history = 20000

[window]
dynamic_title = true
decorations = "Buttonless"

[window.padding]
x = 10
y = 10

[selection]
save_to_clipboard = true

[cursor.style]
shape = "Underline"
blinking = "On"
