theme = "gruvbox"

[editor]
line-number = "relative"
cursorline = true
color-modes = true
popup-border = "all"


[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
mode.normal = "N"
mode.insert = "I"
mode.select = "S"


[editor.file-picker]
hidden = false

[editor.soft-wrap]
enable = true

[keys.normal]
C-s = ":w"

[keys.insert.j]
j = "normal_mode"




