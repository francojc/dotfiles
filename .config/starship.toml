# Info format ----
format = """
$os\
$nix_shell\
$directory\
$rlang\
$python\
$quarto\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

# Segment settings ----

[os]
disabled = false
style = "bright-white"

[os.symbols]
