# Info format ----
format = """
$os\
$nix_shell\
$directory\
$rlang\
$python\
$quarto\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

# Segment settings ----

[os]
disabled = false

[os.symbols]
Macos = "пЕє "
Linux = "пЕЉ "
Ubuntu = "у∞ХИ "
Alpine = "пМА "

[nix_shell]
symbol = "оЬБ"
format = "[$symbol]($style)"

[directory]
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[python]
symbol = "оШЖ"

[rlang]
symbol = "оЪК "

[quarto]
format = "[$symbol$version]($style) "

[git_branch]
symbol = "пРШ"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
stashed = "оШТ"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

# Prompt ----

[character]
success_symbol = "[вЭѓ](purple)"
error_symbol = "[вЭѓ](red)"
vimcmd_symbol = "[вЭЃ](green)"

