# ~/.tmux.conf
#
# This configuration file is for session, window, and pane management handled by Tmux.
# Visual and rendering settings are handled by the terminal emulator (Kitty).

# Set the default terminal. This is important for colors and features.
# Set this to the terminal emulator you are using (e.g., kitty).
set -g default-terminal "screen-256color"
set -ag terminal-features ",xterm-kitty:RGB" # Add kitty-specific features if using kitty

# Mouse support
set -g mouse on

# Set the prefix key.
# Choose a prefix that doesn't conflict with your terminal or applications.
set -g prefix C-a
unbind C-b # Unbind the default prefix (C-b)
bind C-a send-prefix

# Allow the history scrollback to be unlimited (or a very large number)
set -g history-limit 100000

# Enable activity alerts in the window list
setw -g monitor-activity on
set -g visual-activity on

# Base index for windows and panes (start from 1)
set -g base-index 1
setw -g pane-base-index 1

# Status Bar Configuration (similar to tab bar in Kitty)
set -g status-position top # Place status bar at the top
set -g status-interval 15
set -g status-left ''
set -g status-right ''
set -g status-justify right
setw -g window-status-format '#[fg=colour244,bg=colour238] #I:#W #[fg=colour238,bg=colour234]'
setw -g window-status-current-format '#[fg=colour234,bg=colour39] #I:#W #[fg=colour39,bg=colour234]'
setw -g window-status-activity-style fg=colour249,bg=colour238 # Bell on tab equivalent

# Pane Border Styling (handled by Tmux)
setw -g pane-border-style fg=colour238 # Inactive pane border color
setw -g pane-active-border-style fg=colour39 # Active pane border color

# Key Mappings ------------------------------------------
# All keybindings for session, window, and pane management are defined here.
# These require the Tmux prefix key (C-s in this config).

# Clipboard Operations
# Tmux handles clipboard differently depending on the system and terminal.
# This is a common setup for macOS using reattach-to-user-namespace and pbcopy/pbpaste.
# You might need to install reattach-to-user-namespace (e.g., via Homebrew).
bind C-c run "tmux save-buffer - | reattach-to-user-namespace pbcopy" # Copy to system clipboard
bind C-v run "reattach-to-user-namespace pbpaste | tmux load-buffer - ; tmux paste-buffer" # Paste from system clipboard

# Text Insertion Shortcuts
# These are not standard Tmux bindings and are difficult to replicate directly as global bindings.
# You would typically use your shell's keybindings for this (e.g., Zsh or Bash key bindings).
# Alternatively, you can bind them in Tmux with the prefix:
# bind -T prefix - send-keys " <- "
# bind -T prefix m send-keys " |> "

# Window Management (Tmux Panes and Windows)
# Tmux uses panes within a window and multiple windows within a session.
# Kitty's splits are equivalent to Tmux panes. Kitty's windows are equivalent to Tmux windows.

# Layouts
# Tmux has built-in layouts.
bind m select-layout main-vertical # Closest to Kitty's stack layout
bind r rotate-window -U # Rotate panes (similar to Kitty's rotate layout)
bind o select-layout next # Next layout

# Splits (Panes)
# Kitty's hsplit is a horizontal split, before/after are vertical splits.
bind j split-window -h -c "#{pane_current_path}" # Horizontal split (Kitty's hsplit)
bind h split-window -v -b -c "#{pane_current_path}" # Vertical split, before (Kitty's before)
bind l split-window -v -c "#{pane_current_path}" # Vertical split, after (Kitty's after)

# Window Navigation (Tmux Windows)
bind n next-window # Next window
bind p previous-window # Previous window

# Direct window selection (similar to alt+1, alt+2 in Kitty)
bind 1 select-window -t :=1
bind 2 select-window -t :=2
bind 3 select-window -t :=3
bind 4 select-window -t :=4
bind 5 select-window -t :=5
bind 6 select-window -t :=6
bind 7 select-window -t :=7
bind 8 select-window -t :=8
bind 9 select-window -t :=9

# Window Movement (Swap Panes)
# Kitty's swap_with_window is likely swapping the current pane with another pane.
# Tmux's swap-pane does this.
bind r swap-pane -D # Swap current pane with the pane below it (common alternative)

# Window Resizing (Pane Resizing)
# Tmux uses control keys for resizing by default, but we can map to alt+h/k/j/l.
bind -r M-h resize-pane -L 5 # Resize pane left
bind -r M-k resize-pane -U 5 # Resize pane up
bind -r M-j resize-pane -D 5 # Resize pane down
bind -r M-l resize-pane -R 5 # Resize pane right

# Tab Management (Tmux Windows)
bind Tab next-window # Next window (similar to ctrl+tab in Kitty)
# Direct window selection is handled above (bind 1, 2, etc.)
bind i command-prompt "rename-window %%" # Set window title
# discard_event is not a direct Tmux equivalent. You can kill a window or pane.
bind q kill-window # Kill current window

# Configuration (Tmux specific)
bind , command-prompt "split-window -h 'vim ~/.tmux.conf'" # Edit tmux config
bind C-, source-file ~/.tmux.conf \; display-message "tmux config reloaded" # Reload tmux config

# Other Tmux specific settings can be added here.
