# ~/.tmux.conf
# Tmux configuration file

# -------------------------------------------------
# CONFIGURATION
# -------------------------------------------------

# General -----------------------------------------
# Set the prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Mouse support
set -g mouse on

# True color support
set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

# Base index for windows and panes (start from 1)
set -g base-index 1
set -g pane-base-index 1

# Copy-mode mods
set -g history-limit 100000 # Increase scrollback buffer

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind P paste-buffer

# Server management ---------------------------------
bind S new-session
set -s focus-events on
set -s extended-keys on
set -s escape-time 0

# Window management --------------------------------
# View
# bind r move-window -r # renumber
set -g renumber-windows on
set-window-option -g automatic-rename on
set-option -g set-titles on

# Create
bind W new-window -c "#{pane_current_path}" # new window cwd

# Move
bind -r Tab next-window

bind-key 1 select-window -t :1
bind-key 2 select-window -t :2
bind-key 3 select-window -t :3
bind-key 4 select-window -t :4
bind-key 5 select-window -t :5

# Swap
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Remove
bind q kill-window

# Break and join panes
# Break default !
bind ¡ choose-window 'join-pane -s "%%"'

# Pane management ---------------------------------
# Split
bind h split-window -h -b -t:+0 -c "#{pane_current_path}"
bind j split-window -v -c "#{pane_current_path}"
bind k split-window -v -b -t:+0 -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}"

# Move
# Select by direction
bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Misc ---------------------------------------------
# Rename session
bind \" command-prompt -p "rename-session:" "rename-session '%%'"
# Rename window
bind \' command-prompt -p "rename window:" "rename-window %%"

# Images (in Neovim)
set -gq allow-passthrough on
set -g visual-activity off

# Messages
set -g display-time 1500

# Command
set -g status-keys vi

# Configuration
bind R source-file ~/.tmux.conf \; display-message "tmux config reloaded!"

# -------------------------------------------------
# THEMING
# -------------------------------------------------

# Assets --------------------------------
fg="#A79A84"
bg="#3C3836"

# Gruvbox palette
grey="#7C6F64"
red="#FB4934"
green="#B8BB26"
yellow="#FABD2F"
blue="#83A598"
purple="#D3869B"
cyan="#8EC07C"
orange="#FE8019"
pink="#D3869B"
white="#EBDBB2"
black="#282828"

# Powerline symbols
rectangle_left="▌"
rectangle_right="▐"

# Status bar --------------------------------
set -g status on
set -g status-position bottom
set -g status-style bg=${bg},fg=${fg}
set -g status-justify left

# Left side ------
set -g status-left "#[fg=${red},bg=default]${rectangle_left}   #S #[fg=${yellow},bg=default] ${rectangle_left}  "
set -g status-left-length 50

# Window list ----
set -g window-status-format "#[fg=${grey},bg=default] #I #[fg=${white},bg=default]#W"
set -g window-status-current-format "#[fg=${yellow},bg=default] #I #[fg=${yellow}]#W"

# Right side ------
set -g status-right "#[fg=$pink]${rectangle_left}   #P #[fg=${blue}]${rectangle_left}   #h #[fg=default]${rectangle_right}"
set -g status-right-length 50

# Pane border ----------------
set -g pane-border-lines single
set -g pane-border-style fg=${grey}

# -------------------------------------------------
# PLUGINS (not currently in use)
# -------------------------------------------------

# SSH
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'

run '~/.tmux/plugins/tpm/tpm'
